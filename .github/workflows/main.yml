name: Deploy Static Website to GitHub Pages

# 触发条件：推送到 main 分支时执行
on:
  push:
    branches: [ "main" ]

# 权限设置（必须，否则无法写入 Pages）
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 第一步：拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 第二步：由于是纯静态项目，不需要安装依赖和构建，直接部署
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          # 关键：指定部署根目录（根据你的文件结构，根目录包含所有 html）
          source: './'
